server:
  port: 8080 # O Gateway roda na porta padrão web, pois ele é a "frente" da loja

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

spring:
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Mágica: Cria rotas automáticas baseadas no nome do serviço no Eureka
          lower-case-service-id: true # user-service vira /user-service/
      
      # Vamos deixar preparado o CORS (para o Frontend poder acessar)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE